name: Update PRULink Fund Prices

on:
  schedule:
    - cron: '0 1 * * 1-5'   # 09:00 SGT (UTC+8) Monday–Friday
  workflow_dispatch:          # allow manual trigger from GitHub UI

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pdfminer.six requests

      - name: Fetch & update fund prices
        run: python scripts/update_prices.py

      - name: Commit updated prices
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/prulink-data.json
          git diff --staged --quiet || git commit -m "Auto-update PRULink fund prices [skip ci]"
          git push
